name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist
          zip dist/TextureResizer.zip src/TextureResizer.bat src/TextureResizer.ps1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TextureResizer.zip
          body: |
            ## Install

            1. Download **TextureResizer.zip** below
            2. Extract anywhere — no installer needed

            ## Usage

            **Double-click** `TextureResizer.bat` to open a file picker, or **drag and drop** images directly onto it.

            Choose your target size (**2K / 1K / 512px**), pick an output folder, and the resized files are saved alongside the originals with the size appended to the filename (e.g. `MyTexture_2K.png`).

            **Requirements:** Windows 10 or 11 — no Python, no ImageMagick, nothing to install.

            > If Windows SmartScreen warns you on first run, click **More info → Run anyway**.
